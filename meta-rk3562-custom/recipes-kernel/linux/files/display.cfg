# RGB888 parallel LCD via Rockchip VOP + RGB (VO_LCDC pins)
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_DRM=y
CONFIG_DRM_KMS_HELPER=y
CONFIG_DRM_GEM_DMA_HELPER=y
CONFIG_DRM_PANEL=y
CONFIG_DRM_PANEL_SIMPLE=y
CONFIG_DRM_PANEL_SIMPLE_OF_ONLY=y
CONFIG_DRM_ROCKCHIP=y
CONFIG_ROCKCHIP_RGB=y
CONFIG_ROCKCHIP_VOP=y

# Qt linuxfb needs a real /dev/fb0; DRM fbdev emulation provides it.
CONFIG_FB=y
CONFIG_DRM_FBDEV_EMULATION=y
CONFIG_DRM_FBDEV_OVERALLOC=100

# Do not set CONFIG_DRM_NOMODESET — panel mode must be active at boot.

CONFIG_DRM_IGNORE_IOTCL_PERMIT=y
