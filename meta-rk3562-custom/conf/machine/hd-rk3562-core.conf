#@TYPE: Machine
#@NAME: HD-RK3562-CORE
#@DESCRIPTION: Vanxak HD-RK3562-CORE module (LP4X + eMMC)

require conf/machine/include/rk3562-common.inc

MACHINE_FEATURES += "usbgadget"

# On-module eMMC boot (SD/MMC socket not populated on core module)
KERNEL_DEVICETREE = "rockchip/hd-rk3562-core.dtb"
UBOOT_MACHINE = "rk3562_defconfig"

# Root filesystem on eMMC GPT partition (must match wic part-name rootfs)
RK_UPDATEIMG_ROOTDEV = "PARTLABEL=rootfs"

IMAGE_ROOTFS_SIZE ?= "2097152"
IMAGE_ROOTFS_EXTRA_SPACE ?= "65536"
