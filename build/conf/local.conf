MACHINE ??= "hd-rk3562-core"

DISTRO ?= "poky"
INIT_MANAGER = "systemd"

PACKAGE_CLASSES ?= "package_deb package_ipk"

EXTRA_IMAGE_FEATURES ?= "debug-tweaks"

USER_CLASSES ?= "buildstats"

WARN_QA:remove = "patch-fuzz"

PREFERRED_PROVIDER_trust-merger-native = "rk-binary-native"
PREFERRED_PROVIDER_loaderimage-native = "rk-binary-native"

PREMIRRORS:prepend = "\
git://.*/.* https://mirrors.ustc.edu.cn/yocto/git/ \n \
gitsm://.*/.* https://mirrors.ustc.edu.cn/yocto/git/ \n \
http://.*/.* https://mirrors.ustc.edu.cn/yocto/http/ \n \
https://.*/.* https://mirrors.ustc.edu.cn/yocto/https/ \n \
ftp://.*/.* https://mirrors.ustc.edu.cn/yocto/ftp/ \n \
"

MIRRORS += "\
git://.*/.* https://mirrors.ustc.edu.cn/yocto/git/ \n \
gitsm://.*/.* https://mirrors.ustc.edu.cn/yocto/git/ \n \
http://.*/.* https://mirrors.ustc.edu.cn/yocto/http/ \n \
https://.*/.* https://mirrors.ustc.edu.cn/yocto/https/ \n \
ftp://.*/.* https://mirrors.ustc.edu.cn/yocto/ftp/ \n \
"

CONF_VERSION = "2"
